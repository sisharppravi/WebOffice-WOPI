<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebOffice</title>
    <base href="/" />
    <link href="lib/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <!-- ==================== ONLYOFFICE ==================== -->
    <!-- Меняй порт 8080 на тот, который указал в docker run -->
    <script type="text/javascript" src="http://localhost:8080/web-apps/apps/api/documents/api.js"></script>

    <script>
        window.openDocumentEditor = function (url) {
            window.open(url, "_blank", "noopener,noreferrer");
        };

        // Глобальная функция, которую вызывает Blazor
        window.openEditor = function (config) {
            if (!window.DocsAPI) {
                console.error("DocsAPI не загружен!");
                return;
            }

            new DocsAPI.DocEditor("editor", {
                document: config.document,
                documentType: config.documentType || "word",
                editorConfig: config.editorConfig,
                token: config.token,
                height: "800px"
            });
        };
    </script>
    <!-- ==================================================== -->

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
