<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebOffice</title>
    <base href="/" />
    <link href="lib/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        window.openDocumentEditor = function (url) {
            window.open(url, "_blank", "noopener,noreferrer");
        };

        window.submitWopiPost = function (actionUrl, accessToken, accessTokenTtl) {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = actionUrl;

            const tokenInput = document.createElement("input");
            tokenInput.type = "hidden";
            tokenInput.name = "access_token";
            tokenInput.value = accessToken;

            const ttlInput = document.createElement("input");
            ttlInput.type = "hidden";
            ttlInput.name = "access_token_ttl";
            ttlInput.value = String(accessTokenTtl ?? 0);

            form.appendChild(tokenInput);
            form.appendChild(ttlInput);
            document.body.appendChild(form);
            form.submit();
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
